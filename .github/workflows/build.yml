name: Build

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tests
        run: python -m unittest discover tests

      - name: Stamp tag version into MANIFEST.JSON
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "
          import json
          path = 'bomberboy/MANIFEST.JSON'
          with open(path) as f:
              manifest = json.load(f)
          manifest['version'] = '$VERSION'
          with open(path, 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          "
          python3 -c "import json; assert json.load(open('bomberboy/MANIFEST.JSON'))['version'] == '$VERSION'"
          echo "Stamped version $VERSION into bomberboy/MANIFEST.JSON"

      - name: Build .mpk
        id: build
        uses: tjorim/mpos-package-mpk@v1
        with:
          app-dir: bomberboy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bomberboy-mpk
          path: ${{ steps.build.outputs.mpk-path }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.mpk-path }}

      - name: Publish to BadgeHub
        if: startsWith(github.ref, 'refs/tags/v') && env.BADGEHUB_API_TOKEN != ''
        uses: tjorim/mpos-badgehub-publish@v1.0.10
        with:
          slug: bomberboy
          api-token: ${{ secrets.BADGEHUB_API_TOKEN }}
          app-dir: bomberboy
          mpk-path: ${{ steps.build.outputs.mpk-path }}
          categories: Game
        env:
          BADGEHUB_API_TOKEN: ${{ secrets.BADGEHUB_API_TOKEN }}
